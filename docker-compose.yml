version: "3.9"

# ============================================================
#  TP-6 Employee ETL  –  docker-compose.yml
#  Services: mysql | airflow-init | airflow-webserver
#           | airflow-scheduler | streamlit
# ============================================================

x-airflow-common: &airflow-common
  image: apache/airflow:2.9.1
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: ""
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth
    _PIP_ADDITIONAL_REQUIREMENTS: "mysql-connector-python==8.3.0 pandas==2.2.1"
  volumes:
    - ./dags:/opt/airflow/dags
    - ./data:/opt/airflow/data          # CSV lives here
    - airflow_logs:/opt/airflow/logs
    - airflow_plugins:/opt/airflow/plugins
  depends_on:
    postgres:
      condition: service_healthy
    mysql:
      condition: service_healthy

services:

  # ──────────────────────────────────────────────
  # PostgreSQL  (Airflow metadata DB)
  # ──────────────────────────────────────────────
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
    restart: unless-stopped

  # ──────────────────────────────────────────────
  # MySQL  (business data store)
  # ──────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root_pass          # ← change if you want
      MYSQL_DATABASE: employee_db
      MYSQL_USER: etl_user                    # ← must match DB_CONFIG in DAG & Streamlit
      MYSQL_PASSWORD: etl_pass                # ← must match DB_CONFIG in DAG & Streamlit
    ports:
      - "3307:3306"    # host 3307 → avoids clash if you have local MySQL on 3306
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql   # runs on first start
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot_pass"]
      interval: 10s
      retries: 10
    restart: unless-stopped

  # ──────────────────────────────────────────────
  # Airflow – one-time DB init
  # ──────────────────────────────────────────────
  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username admin \
          --password admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@example.com
    restart: "no"

  # ──────────────────────────────────────────────
  # Airflow – Web UI
  # ──────────────────────────────────────────────
  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"    # Airflow UI → http://localhost:8080  (admin / admin)
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      retries: 5
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # ──────────────────────────────────────────────
  # Airflow – Scheduler
  # ──────────────────────────────────────────────
  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # ──────────────────────────────────────────────
  # Streamlit Dashboard
  # ──────────────────────────────────────────────
  streamlit:
    build:
      context: ./streamlit_app
      dockerfile: Dockerfile
    ports:
      - "8501:8501"    # Dashboard → http://localhost:8501
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  mysql_data:
  airflow_logs:
  airflow_plugins:
